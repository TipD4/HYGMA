# --- QMIX+HGCN ablation config ---
# HYGMA MAC + Q-learner: isolates HGCN contribution without extra losses or grouping.
#
#   hygma_mac  → provides HGCN feature injection (agent → HGCN → concat → RNN)
#   q_learner  → standard DQN (RMSprop, no consistency/attention losses)
#   qmix       → monotonic mixing network
#
# grouping_mode is overridden per experiment (default: each_alone).

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000

mac: "hygma_mac"
learner: "q_learner"
mixer: "qmix"
agent_output_type: "q"
double_q: True
agent: "rnn"
rnn_hidden_dim: 64
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64
target_update_interval: 200
batch_size_run: 1
runner: "episode"
batch_size: 128
buffer_size: 5000

# HGCN — no dynamic clustering in ablation; grouping_mode=each_alone by default
grouping_mode: "each_alone"
hgcn_out_dim: 48
hgcn_hidden_dim: 64
hgcn_num_layers: 2

# Clustering still wired up (used by hygma_mac), but probe off + never triggers
clustering_interval: 100000
state_history_length: 5000
stability_threshold: 0.6
min_clusters: 2
max_clusters: 3
fix_grouping_steps: 99999999   # effectively disable dynamic branch
fix_hgcn_steps: 2

# Disable mechanism-first instrumentation
clustering_probe_mode: "off"
attention_record_interval: 0

name: "ablation_qmix_hgcn"
